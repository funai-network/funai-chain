name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_FUNAID: ghcr.io/${{ github.repository_owner }}/funai-chain
  IMAGE_P2P: ghcr.io/${{ github.repository_owner }}/funai-p2p

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build funaid
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -mod=readonly \
            -ldflags "-s -w -X github.com/funai-wiki/funai-chain/app.Version=${{ github.ref_name }}" \
            -o dist/funaid-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/funaid

      - name: Build funai-node
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -mod=readonly \
            -ldflags "-s -w" \
            -o dist/funai-node-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/funai-node

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  publish-docker:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push funaid
        uses: docker/build-push-action@v5
        with:
          context: .
          target: funaid
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_FUNAID }}:${{ github.ref_name }}
            ${{ env.IMAGE_FUNAID }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push funai-node
        uses: docker/build-push-action@v5
        with:
          context: .
          target: funai-node
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_P2P }}:${{ github.ref_name }}
            ${{ env.IMAGE_P2P }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, publish-docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## FunAI Chain ${{ github.ref_name }}

            ### Docker Images
            ```
            docker pull ${{ env.IMAGE_FUNAID }}:${{ github.ref_name }}
            docker pull ${{ env.IMAGE_P2P }}:${{ github.ref_name }}
            ```

            ### Genesis Parameters
            - Chain ID: `funai-1`
            - Bond denom: `ufai` (1 FAI = 1,000,000 ufai)
            - Block time: ~5 seconds
            - Block reward: 4,000 FAI/block

            See [ops-runbook](docs/ops-runbook.md) for deployment instructions.
